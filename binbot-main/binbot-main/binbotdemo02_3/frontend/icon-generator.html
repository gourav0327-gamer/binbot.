<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BinBot Icon Generator</title>
  

  <script src="https://cdn.tailwindcss.com"></script>
  

  <script src="https://unpkg.com/lucide@latest"></script>
  

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="style.css?v=20260307">
  
  <style>
    .pf-footer {
      border-top: 1px solid var(--border-color);
      background: color-mix(in srgb, var(--surface-0) 92%, #000 8%);
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 10;
      margin-top: 3rem;
      width: 100%;
    }
    .pf-footer-wrap {
      max-width: 80rem;
      margin: 0 auto;
      padding: 2.25rem 1rem 1.25rem;
    }
    .pf-footer-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    .pf-brand-link {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
    }
    .pf-logo {
      width: 1.85rem;
      height: 1.85rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--icon-accent-border);
      color: var(--icon-accent);
      background: color-mix(in srgb, var(--icon-accent-soft) 56%, transparent 44%);
    }
    .pf-name {
      color: var(--text-color);
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      font-weight: 800;
      text-transform: uppercase;
    }
    .pf-copy {
      margin: 0.75rem 0 0;
      color: var(--text-muted);
      line-height: 1.55;
      max-width: 32ch;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .pf-nav-title {
      color: var(--text-color);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      font-weight: 800;
      text-transform: uppercase;
      margin: 0 0 0.8rem;
      display: block;
    }
    .pf-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }
    .pf-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.42rem 0.74rem;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--border-color) 88%, transparent 12%);
      transition: all 0.2s ease;
    }
    .pf-links a:hover {
      color: var(--text-color);
      border-color: var(--border-hover);
      background: color-mix(in srgb, var(--surface-hover) 55%, transparent 45%);
    }
    .pf-bottom {
      margin-top: 1.4rem;
      padding-top: 1rem;
      border-top: 1px solid color-mix(in srgb, var(--border-color) 78%, transparent 22%);
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 700;
    }
    @media (max-width: 900px) {
      .pf-footer-grid {
        grid-template-columns: 1fr;
        gap: 1.1rem;
      }
      .pf-copy {
        max-width: 100%;
      }
    }
  
    :root[data-theme="light"] .pf-footer {
      background: color-mix(in srgb, var(--surface-0) 78%, #ffffff 22%);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden selection:bg-white/20 selection:text-white">

  <main class="icon-generator-main w-full">
    <!-- The exact BinBot icon at 512x512 -->
    <div id="icon-render" style="width:512px; height:512px;" class="rounded-full bg-gradient-to-br from-emerald-500/20 to-transparent border-[4px] border-emerald-500/30 flex items-center justify-center shadow-[0_0_60px_rgba(16,185,129,0.15)]">
      <i data-lucide="leaf" style="width:240px; height:240px;" class="text-emerald-400"></i>
    </div>

    <p style="color:#888; font-size:14px; margin-top:16px;">Click the button below to download the exact icon as PNG</p>

    <button onclick="downloadIcon()" style="padding:12px 32px; background:white; color:black; border:none; border-radius:12px; font-weight:bold; font-size:14px; cursor:pointer;">
      Download as PNG (512x512)
    </button>
  </main>
  

  <script>
    lucide.createIcons();

    function downloadIcon() {
      const icon = document.getElementById('icon-render');
      html2canvas(icon, {
        backgroundColor: null,
        scale: 1,
        width: 512,
        height: 512,
        useCORS: true
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'binbot-icon-512.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
  

  
  <footer class="pf-footer">
    <div class="pf-footer-wrap">
      <div class="pf-footer-grid">
        <div>
          <a href="index.html" class="pf-brand-link">
            <span class="pf-logo" aria-hidden="true">
              <i data-lucide="leaf" class="w-4 h-4"></i>
            </span>
            <span class="pf-name">BinBot</span>
          </a>
          <p class="pf-copy">Sort smarter, recycle faster, and build daily habits for a cleaner planet.</p>
        </div>

        <nav aria-label="Quick links">
          <span class="pf-nav-title">Quick Links</span>
          <div class="pf-links">
            <a href="classify.html">Classify</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="history.html">History</a>
            <a href="map.html">Map</a>
          </div>
        </nav>

        <nav aria-label="Legal links">
          <span class="pf-nav-title">Legal</span>
          <div class="pf-links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Service</a>
          </div>
        </nav>
      </div>

      <div class="pf-bottom">&copy; 2026 BinBot. Built for a greener planet.</div>
    </div>
  </footer>
<script src="js/ui-effects.js" defer></script>
</body>
</html>
